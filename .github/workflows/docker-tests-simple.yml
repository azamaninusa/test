name: Docker Tests

on:
  push:
    branches: [docker-gha]
  pull_request:
    branches: [docker-gha]
  workflow_dispatch:
  schedule:
    - cron: "00 23 * * 1-5"

env:
  DOCKER_IMAGE: vaxcare-tests
  TEST_ENVIRONMENT: Staging

jobs:
  test:
    name: Run Tests
    runs-on:
      group: QA

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show current time (runner + UTC)
        shell: bash
        run: |
          echo "Runner local now: $(date)"
          echo "UTC now:          $(date -u)"
          echo "New York now:     $(TZ=America/New_York date)"
          echo "TZ env:           ${TZ:-<not set>}"

      - name: Build Docker image
        shell: bash
        run: |
          docker build -t "${{ env.DOCKER_IMAGE }}:latest" .

      - name: Create test results directory
        shell: bash
        run: |
          mkdir -p TestResults/screenshots TestResults/html
          chmod -R 777 TestResults || true
          ls -la TestResults/ || true

      - name: Run tests
        id: run_tests
        shell: bash
        run: |
          set +e
          docker run --rm \
            --name vaxcare-tests \
            -v "${{ github.workspace }}/TestResults:/app/TestResults:rw" \
            "${{ env.DOCKER_IMAGE }}:latest" 2>&1 | tee test-output.log
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "TEST_EXIT_CODE=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "Docker run exit code: $TEST_EXIT_CODE"

      - name: Check screenshots
        if: always()
        id: check_screenshots
        shell: bash
        run: |
          mkdir -p TestResults/screenshots
          SCREENSHOT_COUNT="$(find TestResults/screenshots -type f -name "*.png" 2>/dev/null | wc -l || echo "0")"
          if [ "$SCREENSHOT_COUNT" -gt 0 ]; then
            echo "has_screenshots=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_screenshots=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload screenshots
        if: always() && steps.check_screenshots.outputs.has_screenshots == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: TestResults/screenshots
          retention-days: 7
          if-no-files-found: warn

      - name: Parse TRX + pass/fail summary
        if: always()
        id: check_test_results
        shell: bash
        run: |
          TRX="TestResults/TestResults.trx"
          TEST_EXIT_CODE="${{ steps.run_tests.outputs.TEST_EXIT_CODE }}"

          TOTAL="unknown"
          PASSED="unknown"
          FAILED="unknown"
          SKIPPED="unknown"
          TESTS_FAILED="false"

          if [ -f "$TRX" ]; then
            TOTAL="$(grep -c '<UnitTestResult' "$TRX" || echo "0")"
            PASSED="$(grep -o 'outcome="Passed"' "$TRX" | wc -l || echo "0")"
            FAILED="$(grep -o 'outcome="Failed"' "$TRX" | wc -l || echo "0")"
            SKIPPED="$(grep -oE 'outcome="(NotExecuted|Skipped)"' "$TRX" | wc -l || echo "0")"
            if [ "$FAILED" -gt 0 ]; then TESTS_FAILED="true"; fi
          else
            if [ "$TEST_EXIT_CODE" != "0" ]; then TESTS_FAILED="true"; fi
          fi

          echo "TESTS_FAILED=$TESTS_FAILED" >> "$GITHUB_OUTPUT"
          echo "TOTAL=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "PASSED=$PASSED" >> "$GITHUB_OUTPUT"
          echo "FAILED=$FAILED" >> "$GITHUB_OUTPUT"
          echo "SKIPPED=$SKIPPED" >> "$GITHUB_OUTPUT"

      - name: Write GitHub summary (pass/fail only)
        if: always()
        shell: bash
        run: |
          STATUS="PASSED"
          if [ "${{ steps.check_test_results.outputs.TESTS_FAILED }}" = "true" ]; then
            STATUS="FAILED"
          fi

          {
            echo "## Test Summary"
            echo ""
            echo "- Status: **$STATUS**"
            echo "- Total: ${{ steps.check_test_results.outputs.TOTAL }}"
            echo "- Passed: ${{ steps.check_test_results.outputs.PASSED }}"
            echo "- Failed: ${{ steps.check_test_results.outputs.FAILED }}"
            echo "- Skipped: ${{ steps.check_test_results.outputs.SKIPPED }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Microsoft Teams (pass/fail only)
        if: always()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TESTS_FAILED: ${{ steps.check_test_results.outputs.TESTS_FAILED }}
          TOTAL: ${{ steps.check_test_results.outputs.TOTAL }}
          PASSED: ${{ steps.check_test_results.outputs.PASSED }}
          FAILED: ${{ steps.check_test_results.outputs.FAILED }}
          SKIPPED: ${{ steps.check_test_results.outputs.SKIPPED }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          if [ -z "${TEAMS_WEBHOOK_URL:-}" ]; then
            echo "TEAMS_WEBHOOK_URL secret not set; skipping."
            exit 0
          fi

          STATUS="PASSED"
          THEME_COLOR="2EB886"
          if [ "${TESTS_FAILED:-false}" = "true" ]; then
            STATUS="FAILED"
            THEME_COLOR="A30200"
          fi

          export STATUS THEME_COLOR

          payload="$(python3 -c 'import json, os
env_name=os.environ.get(\"TEST_ENVIRONMENT\",\"Staging\")
status=os.environ.get(\"STATUS\",\"UNKNOWN\")
theme=os.environ.get(\"THEME_COLOR\",\"00FF00\")
facts=[
  {\"name\":\"Environment\",\"value\":env_name},
  {\"name\":\"Repo\",\"value\":os.environ.get(\"REPO\",\"\")},
  {\"name\":\"Branch\",\"value\":os.environ.get(\"REF_NAME\",\"\")},
  {\"name\":\"Total Tests\",\"value\":os.environ.get(\"TOTAL\",\"unknown\")},
  {\"name\":\"Passed\",\"value\":os.environ.get(\"PASSED\",\"unknown\")},
  {\"name\":\"Failed\",\"value\":os.environ.get(\"FAILED\",\"unknown\")},
  {\"name\":\"Skipped\",\"value\":os.environ.get(\"SKIPPED\",\"unknown\")},
  {\"name\":\"Run\",\"value\":os.environ.get(\"RUN_URL\",\"\")},
]
card={
  \"@type\":\"MessageCard\",
  \"@context\":\"http://schema.org/extensions\",
  \"summary\":\"QA Test Report\",
  \"themeColor\":theme,
  \"title\":f\"Automation Test Results ({status})\",
  \"sections\":[{\"facts\":facts}],
}
print(json.dumps(card))')"

          curl -sS -H "Content-Type: application/json" -d "$payload" "$TEAMS_WEBHOOK_URL" >/dev/null

      - name: Fail workflow if tests failed
        if: steps.check_test_results.outputs.TESTS_FAILED == 'true'
        shell: bash
        run: |
          echo "❌ Test failures detected. Failing workflow."
          exit 1